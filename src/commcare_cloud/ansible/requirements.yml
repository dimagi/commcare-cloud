    name: andrewrothstein.couchdb-cluster-src
  - src: git+https://github.com/dimagi/ansible-couchdb-cluster.git
    version: c2ba16721015ff1a10d1b83dfee9a54966e05fa6
    name: andrewrothstein.couchdb-cluster-apt
  - src: git+https://github.com/ANXS/tmpreaper.git
    version: 46f8e0b8b8f5732eecc68b08b5e0c392c418e3f3
    name: tmpreaper
  - src: git+https://github.com/nickhammond/ansible-logrotate.git

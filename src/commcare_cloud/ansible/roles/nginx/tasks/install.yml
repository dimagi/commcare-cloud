---
- name: Add Nginx apt key
  become: yes
  apt_key: url=https://nginx.org/keys/nginx_signing.key state=present

- name: Remove nginx mainline repository
  become: yes
  apt_repository: repo='deb http://nginx.org/packages/mainline/ubuntu/ {{ ansible_distribution_release }} nginx' state=absent

- name: Add nginx stable repository
  become: yes
  apt_repository: repo='deb http://nginx.org/packages/ubuntu {{ ansible_distribution_release }} nginx' state=present

- name: Install nginx
  become: yes
  apt: name="nginx={{ nginx_version }}" state=present update_cache=yes cache_valid_time=3600
  notify: 'quick start nginx'

- name: Flush handlers - start nginx as quickly as possible for minimal downtime
  meta: flush_handlers

- name: Make sure nofile ulimit is high
  become: yes
  lineinfile:
    path: /etc/default/nginx
    regexp: '^ULIMIT='
    line: 'ULIMIT="-n 65536"'
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create sites-available and sites-enabled and allow cchq user to modify
  become: yes
  file:
    path: "{{ item }}"
    owner: "{{ cchq_user }}"
    group: "{{ cchq_user }}"
    mode: "u=rwx,g=rwx,o=r"
    state: directory
  with_items:
    - /etc/nginx/sites-available
    - /etc/nginx/sites-enabled

- name: Create nginx http user
  become: yes
  user: name="{{ nginx_user }}" createhome=no password=no state=present groups="{{ cchq_user }}"

- name: Copy the nginx configuration file
  become: yes
  template: src=nginx.conf.j2 dest=/etc/nginx/nginx.conf mode=0644
  notify: reload nginx

- name: Copy the nginx default configuration file
  become: yes
  template: src=default.conf.j2 dest=/etc/nginx/conf.d/default.conf mode=0644
  notify: reload nginx

- name: Copy the nginx default site configuration file
  become: yes
  template: src=default.j2 dest=/etc/nginx/sites-available/default mode=0644
  notify: reload nginx

- name: Create the link for site enabled specific configurations
  become: yes
  file: path=/etc/nginx/sites-enabled/default state=link src=/etc/nginx/sites-available/default force=yes
  notify: reload nginx

- name: Make sure the log directory exists
  # load-failure (see .ansible-lint-ignore): This cross-role import resolves
  # relative to the playbook dir; ansible-lint resolves relative to the role root.
  import_tasks: roles/commcarehq/tasks/www_log_dir.yml

- name: Mark nginx as installed
  set_fact: nginx_installed=True


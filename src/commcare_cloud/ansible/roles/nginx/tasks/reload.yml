---
- name: check nginx configuration
  become: yes
  command: "nginx -t"
  register: result
  check_mode: no
  failed_when: "result.rc != 0"
  changed_when: no

- name: check for nginx PID
  stat:
    path: "/var/run/nginx.pid"
  register: pid_file

- name: restart nginx if pid file empty
  become: yes
  service: name=nginx state=restarted enabled=yes
  when: "pid_file.stat.size == 0"

- name: reload the nginx service
  become: yes
  service: name=nginx state=reloaded enabled=yes

- name: Assert nginx is running
  become: yes
  # `systemctl status` is exempt from ansible-lint's command-instead-of-module
  # rule but `is-active` is not, hence the noqa. is-active is used because it
  # gives a precise active/inactive result instead of substring-matching on
  # human-readable status output.
  command: systemctl is-active nginx  # noqa: command-instead-of-module
  register: nginx_status
  changed_when: false
  failed_when: nginx_status.stdout != "active"
